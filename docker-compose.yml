services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: base
    command: npx tsx watch packages/backend/src/index.ts
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=dev-secret-key-change-in-production-min-32-chars
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-in-production-min-32
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/prisma:/app/packages/backend/prisma
      - backend_data:/app/packages/backend/prisma
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: build
    command: npx vite --host 0.0.0.0
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend/src:/app/packages/frontend/src
      - ./packages/frontend/public:/app/packages/frontend/public
      - ./packages/frontend/index.html:/app/packages/frontend/index.html
    depends_on:
      - backend

volumes:
  backend_data:
