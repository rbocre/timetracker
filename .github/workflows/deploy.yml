name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-frontend-gh-pages:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend
        env:
          VITE_API_URL: ${{ vars.API_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend-vps:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_VPS == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/timetracker
            git pull origin main
            npm ci --workspace=packages/backend
            npx prisma migrate deploy --schema=packages/backend/prisma/schema.prisma
            npm run build:backend
            pm2 restart timetracker-backend || pm2 start packages/backend/dist/index.js --name timetracker-backend
